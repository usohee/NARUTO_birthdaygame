<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>카카시 선생님을 따라 '화둔'을 훈련하자!</title>
  <link rel="stylesheet" href="CSS/game.css">
</head>
<body>
    <div class="game">
    <div id="akatsuki-overlay" class="akatsuki-overlay" style="display: none;">
    <p id="akatsuki-text" class="event-text"></p>
    
    <video id="akatsuki-video" style="display: none;">
        <source src="assets/Video/akatsuki.mp4" type="video/mp4">
    </video>
</div>

        <img id="surprise-balloon" src="assets/ui/surprise_baloon.png" class="surprise-balloon" style="display: none;">
        <img src="assets/background/ramen.PNG" id="center-img" class="center-img">
        <img src="assets/ui/book.png" id="book" class="book">
        <img src="assets/ui/logo.png" alt="logo" class="logo">
        <div id="hand-sign-display" class="hand-sign-container"></div>
        <img src="assets\characters\kakashi.png" class="character kakashi" alt="카카시" class="kakashi">
        <img src="assets\characters\injae_left.png" class="character injae" alt="인제">
    </div>
    <audio id="shuk-sound" src="assets/Sounds/shuk.mp3" preload="auto"></audio>
    <script src="JS\game.js"></script>
</body>
</html>
