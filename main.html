<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>전설의 화둔 술법 완성하기! intro 화면</title>
  <link rel="stylesheet" href="CSS/main.css">
</head>
<body>
    <audio id="main-bgm" loop>
        <source src="assets/sounds/Naruto_Main_Theme.mp3" type="audio/mpeg">
    </audio>

    <div id="fade-overlay"></div>
    <div class="intro">
        <button id="sound-toggle" class="sound-btn">
            <img id="sound-icon" src="assets/ui/sound_off.png" alt="소리 끔">
        </button>
        <img src="assets/background/intro.PNG" alt="background-intro" class="center-img">
        <img src="assets/ui/logo.png" alt="logo" class="main-logo">
        <img src="assets/ui/start.png" alt="start" id="start-btn" class="start-bt">
    </div> 
<script src="JS/main.js"></script>
</body>
</html>
